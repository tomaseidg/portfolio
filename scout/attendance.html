<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الكشافة | الحضور الذكي</title>
        <meta property="og:title" content="الكشافة | الحضور الذكي">
    <meta property="og:description" content="نظام ذكي لتنظيم حضور مجموعات الكشافه بسهولة">
    <meta property="og:image" content="5.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg-color: #0b0f1a;
            --card-bg: #161e2d;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: rgba(255, 255, 255, 0.08);
        }
        :root[data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #0284c7;
            --border: rgba(0, 0, 0, 0.08);
        }

        body, html {
            height: 100vh; margin: 0; overflow: hidden;
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
        }

        /* Header */
        header {
            padding: 0.7rem 5%; background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Main Layout */
        main {
            flex: 1; display: flex; padding: 20px; gap: 20px;
            max-width: 1600px; margin: 0 auto; width: 100%;
        }

        /* Sidebar Style for Leaders (PC) */
        .sidebar-section {
            flex: 0 0 300px; /* عرض ثابت لقسم القادة في الكمبيوتر */
            display: flex; flex-direction: column;
        }

        /* Content Grid (The 5 Stages) */
        .content-grid {
            flex: 1; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            grid-template-rows: 1fr 1fr;
            gap: 20px;
        }

        /* Card Component */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .glass-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .section-title {
            font-size: 1.7rem; font-weight: 700; margin-bottom: 1.25rem;
            display: flex; align-items: center; gap: 10px; color: var(--accent);
        }

        .link-group {
            display: flex; flex-direction: column; gap: 8px; flex: 1;
        }

        .action-link {
            padding: 12px 16px; border-radius: 12px;
            background: rgba(var(--accent), 0.1);
            color: var(--text-main); text-decoration: none;
            font-size: 1.4rem; border: 1px solid transparent;
            transition: 0.2s; display: flex; justify-content: space-between;
        }
        .action-link:hover {
            background: var(--accent); color: #fff;
        }
        .action-link::after { content: '←'; opacity: 0.5; }

        /* Footer */
        footer {
            padding: 0.8rem; text-align: center; font-size: 0.85rem;
            border-top: 1px solid var(--border); background: var(--card-bg);
        }

        /* Responsive */
        @media (max-width: 1100px) {
            main { flex-direction: column; overflow-y: auto; }
            body { overflow: auto; }
            .sidebar-section { flex: none; }
            .content-grid { grid-template-rows: auto; }
        }
    </style>
</head>
<body>

<header>
    <div class="d-flex align-items-center">
        <img style="width: 50px;" src="5.png" alt="Logo" class="header-logo">
        <h5 style="padding: 0px 12px;" class="mb-0 fw-bold">الكشافة <span style="font-weight: 300; opacity: 0.7;">| الحضور الذكي</span></h5>
    </div>
    <button class="btn btn-sm btn-dark border-secondary" onclick="toggleTheme()">🌓 المظهر</button>
</header>

<main>
    <div class="sidebar-section">
        <div class="glass-card h-100" style="border-right: 4px solid var(--accent);">
            <div class="section-title">🛡️ إدارة القادة</div>
            <div class="link-group">
                <a href="coming.html" class="action-link">كل القادة</a>
            </div>
        </div>
    </div>

    <div class="content-grid">
        <div class="glass-card">
            <div class="section-title">👶 البراعم</div>
            <div class="link-group">
                <a target="_blank" href="https://script.google.com/macros/s/AKfycbzm4ra4AYjahKe5dXVa5mRMha8_hc1U4fAC1Rp3oIa8fWfSSY3BEZtjNQUIPA-bPg/exec" class="action-link">فريق البراعم</a>
            </div>
        </div>

        <div class="glass-card">
            <div class="section-title">🧒 الأشبال والزهرات</div>
            <div class="link-group">
                <a target="_blank" href="https://script.google.com/macros/s/AKfycbxliWYmh186qqzPK5ZdKuKtA_xXQ4QJWiMmVuMZQlZirYzR2jsOC7urroH1YxrNcUNh/exec" class="action-link">فريق الأشبال والزهرات</a>
            </div>
        </div>

        <div class="glass-card">
            <div class="section-title">⚜️ كشاف ومرشدات</div>
            <div class="link-group">
                <a target="_blank" href="https://script.google.com/macros/s/AKfycbxaieNquaUTYymf8KYFI-vIG176vsXSED3UfwkD0IaiLySPQLSuD3gsDoYF6zb_KKDM/exec" class="action-link">فريق كشافة</a>
                <a target="_blank" href="https://script.google.com/macros/s/AKfycbwg6rzUBXdBOTiY3wd0aDLz2im5mab_Ta23vtAhEFH5reIQc6A_5q2ibWf1oF1HnjI/exec" class="action-link">فريق مرشدات</a>
            </div>
        </div>

        <div class="glass-card">
            <div class="section-title">🧗 متقدم ورائدات</div>
            <div class="link-group">
                <a target="_blank" href="https://script.google.com/macros/s/AKfycby3ZTavZ6rddh1-RcsPucs5r77tFZkXeze2qTz-NYXSmRu0u7yeu4Dz2EsH0rcfpQzN/exec" class="action-link">فريق المتقدم</a>
                <a target="_blank" href="https://script.google.com/macros/s/AKfycbw7z6n_XuxkSfldHtaJ-KAzKdIO5Z7ikW_9rLIRUldxp52E-hDf3HzG3b35Dv0c40qK/exec" class="action-link">فريق الرائدات</a>
            </div>
        </div>

        <div class="glass-card" style="grid-column: span 1;">
            <div class="section-title">⛺ الجوالة</div>
            <div class="link-group">
                <a target="_blank" href="https://script.google.com/macros/s/AKfycbwEih73Ep5p3GdYba-HgvHU3YeelBDrIKmeJa8TU8ZqItT4SpD2L27PWcYfsENT_mY/exec" class="action-link">جوالة</a>
            </div>
        </div>
    </div>
</main>

<footer>
    Powered by <a href="https://thomaseg.netlify.app/" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: 600;">ThomasLab's</a>
</footer>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
</script>

</body>
</html>
