<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThomasLab | ID Generator Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass-card { 
            background: #1e293b; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
        }
        .custom-input {
            width: 100%;
            background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 10px;
            color: #fff;
            outline: none;
        }
         /* الهيدر الرئيسي */
        .main-header {
            background: var(--card-bg);
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .hidden { display: none; }
        select option { background: #1e293b; color: white; }
    </style>
</head>
<body class="p-6">
    <header class="main-header" style="text-align: center;">
        <div class="flex items-center">
            <a href="qr.html" class="bg-slate-700 text-white px-3 py-1 rounded-lg text-sm ml-4 hover:bg-slate-600 transition">الرئيسية</a>
            <div class="flex items-center">
                <h1 class="text-lg font-black tracking-tight">ThomasLab <span class="font-light opacity-70">| QR Tools</span></h1>
            </div>
        </div>
    </header>

    <div class="max-w-4xl mx-auto">
        <section id="tool5" class="tool-section transition-all">
            <div class="glass-card md:p-10">
                <div class="mb-8 border-r-4 border-indigo-500 pr-4">
                    <h2 class="text-2xl font-black">منشئ كروت الهوية المخصص لفرق كشافة</h2>
                    <p class="opacity-60 text-sm mt-1">مقاس 73x45 مم | 12 كارت في الصفحة</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div class="space-y-4">
                        <h3 class="font-black text-indigo-400 border-b border-white/10 pb-2">1. البيانات المتغيرة والشكل</h3>
                        <label class="block">
                            <span class="text-xs font-bold opacity-60">ملف الأسماء والأكواد</span>
                            <input type="file" id="t5Excel" accept=".xlsx, .xls, .csv" class="mt-1 block w-full border-2 border-dashed border-slate-700 p-3 rounded-xl text-sm">
                        </label>
                        <div class="flex items-center gap-4 bg-slate-800/50 p-3 rounded-xl">
                            <span class="text-xs font-bold opacity-70">لون الهوية:</span>
                            <input type="color" id="t5Color" value="#fb8c00" class="h-10 w-20 rounded cursor-pointer bg-transparent">
                        </div>
                        <input type="text" id="t5FileName" placeholder="اسم ملف الـ PDF النهائي" class="custom-input font-bold text-indigo-400">
                    </div>

                    <div class="space-y-4">
                        <h3 class="font-black text-emerald-400 border-b border-white/10 pb-2">2. البيانات الثابتة والشعارات</h3>
                        <div class="grid grid-cols-1 gap-2">
                            <input type="text" id="t5ServiceName" value="مجموعة النجار الكشفية " placeholder="اسم الخدمة" class="custom-input text-sm">
                            <select id="t5LevelSelect" class="custom-input text-sm" onchange="updateLevelTheme()">
                                <option value="" disabled selected>اختر الفريق...</option>
                                <option value="فريق براعم" data-color="#ff8c00">فريق براعم (برتقالي)</option>
                                <option value="فريق أشبال وزهرات" data-color="#ffeb3b">فريق أشبال وزهرات (أصفر)</option>
                                <option value="فريق كشاف ومرشدات" data-color="#4caf50">فريق كشاف ومرشدات (أخضر)</option>
                                <option value="فريق متقدم ورائدات" data-color="#800000">فريق متقدم ورائدات (نبيتي)</option>
                                <option value="فريق جوالة" data-color="#f44336">فريق جوالة (أحمر)</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="block">
                                <span class="text-[10px] font-bold opacity-50">لوجو  (يمين)</span>
                                <input type="file" id="t5ServiceLogo" accept="image/*" class="text-[10px] w-full">
                            </label>
                            <label class="block">
                                <span class="text-[10px] font-bold opacity-50">لوجو  (يسار)</span>
                                <input type="file" id="t5LevelLogo" accept="image/*" class="text-[10px] w-full">
                            </label>
                        </div>
                    </div>
                </div>

                <button onclick="processIDCards()" id="btnT5" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-5 rounded-2xl shadow-xl transition-all text-lg">إنشاء وتصدير 21 كارت/صفحة</button>
                
                <div id="progressContainerT5" class="hidden mt-8 space-y-3">
                    <div class="flex justify-between items-end">
                        <div class="flex flex-col">
                            <span id="currentActionT5" class="text-xs font-bold text-indigo-400">جاري بدء المعالجة...</span>
                            <span id="currentPersonT5" class="text-sm font-black text-white truncate max-w-[200px]">تحميل البيانات</span>
                        </div>
                        <span id="percentTextT5" class="text-2xl font-black text-indigo-500">0%</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-3 overflow-hidden border border-white/5">
                        <div id="progressBarT5" class="bg-indigo-500 h-full w-0 transition-all duration-300 ease-out shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
                    </div>
                </div>
                <div id="statusT5" class="mt-4 text-center font-bold text-indigo-500 min-h-[1rem]"></div>
            </div>
        </section>

        <div id="temp-qr" class="hidden"></div>
        <canvas id="finalCanvas" class="hidden"></canvas>
    </div>

    <footer class="py-4 mt-10">
        <div class="max-w-6xl mx-auto text-center text-xs font-bold opacity-60">
            جميع الحقوق محفوظة &copy; 2026 <a target="_blank" href="https://thomaseg.netlify.app/" class="text-sky-400 underline ml-1">ThomasLab's</a>
        </div>
    </footer>

    <script>
        function updateLevelTheme() {
            const select = document.getElementById('t5LevelSelect');
            const selectedOption = select.options[select.selectedIndex];
            const color = selectedOption.getAttribute('data-color');
            if(color) {
                document.getElementById('t5Color').value = color;
            }
        }

        async function processIDCards() {
            const excelFile = document.getElementById('t5Excel').files[0];
            const sLogoInput = document.getElementById('t5ServiceLogo').files[0];
            const lLogoInput = document.getElementById('t5LevelLogo').files[0];
            const themeColor = document.getElementById('t5Color').value;
            
            const darkenColor = (hex, percent) => {
                let r = parseInt(hex.slice(1, 3), 16),
                    g = parseInt(hex.slice(3, 5), 16),
                    b = parseInt(hex.slice(5, 7), 16);
                r = Math.floor(r * (1 - percent));
                g = Math.floor(g * (1 - percent));
                b = Math.floor(b * (1 - percent));
                return `rgb(${r}, ${g}, ${b})`;
            };
            const darkThemeColor = darkenColor(themeColor, 0.3);

            const container = document.getElementById('progressContainerT5');
            const bar = document.getElementById('progressBarT5');
            const percentTxt = document.getElementById('percentTextT5');
            const actionTxt = document.getElementById('currentActionT5');
            const personTxt = document.getElementById('currentPersonT5');
            const statusTxt = document.getElementById('statusT5');

            if(!excelFile) return alert("يرجى اختيار ملف الإكسيل");

            container.classList.remove('hidden');
            statusTxt.innerText = "";
            bar.style.width = "0%";
            percentTxt.innerText = "0%";

            try {
                actionTxt.innerText = "جاري تحضير الشعارات...";
                
                const loadImg = async (file, defaultPath) => {
                    if (file) return new Promise(r => { const fr = new FileReader(); fr.onload=e=>r(e.target.result); fr.readAsDataURL(file); });
                    try {
                        const response = await fetch(defaultPath);
                        if(response.ok) {
                            const blob = await response.blob();
                            return new Promise(r => { const fr = new FileReader(); fr.onload=e=>r(e.target.result); fr.readAsDataURL(blob); });
                        }
                    } catch(e) {}
                    return null;
                };

                const sLogoImg = await loadImg(sLogoInput, '1.png');
                const lLogoImg = await loadImg(lLogoInput, '2.png');
                
                const sName = document.getElementById('t5ServiceName').value || "";
                const lName = document.getElementById('t5LevelSelect').value || "";

                const workbook = XLSX.read(await excelFile.arrayBuffer());
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                const total = json.length;

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4', compress: true });
                
                const cardW = 73, cardH = 45;
                const cols = 2, rows = 6;
                const spacing = 0.2;

                const totalWidth = (cols * cardW) + ((cols - 1) * spacing);
                const totalHeight = (rows * cardH) + ((rows - 1) * spacing);
                const marginX = (210 - totalWidth) / 2;
                const marginY = (297 - totalHeight) / 2;

                const canvas = document.getElementById('finalCanvas');
                const ctx = canvas.getContext('2d', { alpha: false });
                const scale = 4; 
                canvas.width = 720 * scale; 
                canvas.height = 450 * scale; 
                ctx.scale(scale, scale);

                let c=0, r=0;

                for(let i=0; i < total; i++) {
                    const qrVal = String(json[i][json[i].hasOwnProperty('qr') ? 'qr' : Object.keys(json[i])[0]] || "");
                    const nameVal = json[i][Object.keys(json[i]).find(k => k.includes('الاسم') || k.toLowerCase().includes('name'))] || "-----------------";
                    
                    const percent = Math.round(((i + 1) / total) * 100);
                    bar.style.width = percent + "%";
                    percentTxt.innerText = percent + "%";
                    actionTxt.innerText = `جاري معالجة الكارت (${i + 1} من ${total})`;
                    personTxt.innerText = nameVal;

                    const div = document.getElementById('temp-qr'); div.innerHTML = "";
                    new QRCode(div, {text: qrVal, width: 400, height: 400, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H});
                    await new Promise(res => setTimeout(res, 40));
                    const qrCanvas = div.querySelector('canvas');

                    // 1. رسم الخلفية
                    const gradient = ctx.createLinearGradient(0, 0, 0, 450);
                    gradient.addColorStop(0, "#FFFFFF");
                    gradient.addColorStop(1, "#F0F4F8");
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, 720, 450);

                    // 2. الشريط العلوي
                    ctx.fillStyle = darkThemeColor;
                    ctx.fillRect(0, 0, 720, 35);

                    // 3. الشعارات
                    const logoSize = 88;
                    if(sLogoImg) {
                        const img = await new Promise(r => {const i=new Image(); i.onload=()=>r(i); i.src=sLogoImg;});
                        ctx.drawImage(img, 720 - 115, 55, logoSize, logoSize); 
                    }
                    if(lLogoImg) {
                        const img = await new Promise(r => {const i=new Image(); i.onload=()=>r(i); i.src=lLogoImg;});
                        ctx.drawImage(img, 27, 55, logoSize, logoSize); 
                    }

                    // 4. النصوص
                    ctx.textAlign = "center";
                    ctx.font = "bold 32px Cairo"; 
                    ctx.fillStyle = "#1A1A1A";
                    ctx.fillText(sName, 360, 80);
                    
                    ctx.font = "24px Cairo"; 
                    ctx.fillStyle = "#6B7280";
                    ctx.fillText(lName, 360, 115);

                    // الخط الفاصل
                    ctx.strokeStyle = "#E5E7EB";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(185, 135);
                    ctx.lineTo(535, 135);
                    ctx.stroke();

                    // 5. منطقة الـ QR
                    const qrBoxSize = 200, qrX = 40, qrY = 185, radius = 15;
                    ctx.fillStyle = "white";
                    ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.08)";
                    ctx.beginPath();
                    ctx.moveTo(qrX + radius, qrY);
                    ctx.arcTo(qrX + qrBoxSize, qrY, qrX + qrBoxSize, qrY + qrBoxSize, radius);
                    ctx.arcTo(qrX + qrBoxSize, qrY + qrBoxSize, qrX, qrY + qrBoxSize, radius);
                    ctx.arcTo(qrX, qrY + qrBoxSize, qrX, qrY, radius);
                    ctx.arcTo(qrX, qrY, qrX + qrBoxSize, qrY, radius);
                    ctx.closePath();
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.drawImage(qrCanvas, qrX + 15, qrY + 15, 170, 170);

                    // 6. بيانات الشخص
                    ctx.textAlign = "right";
                    ctx.font = "bold 38px Cairo";
                    ctx.fillStyle = themeColor;
                    ctx.fillText(nameVal.split(' ').slice(0, 3).join(' '), 680, 260); 
                    
                    ctx.font = "bold 28px Cairo";
                    ctx.fillStyle = "#4B5563";
                    ctx.fillText(`كود: ${qrVal}`, 680, 330); 

                    const xPos = marginX + (c * (cardW + spacing));
                    const yPos = marginY + (r * (cardH + spacing));
                    doc.addImage(canvas.toDataURL("image/png"), 'PNG', xPos, yPos, cardW, cardH, undefined, 'FAST');
                    
                    // رسم حدود القص
                    doc.setDrawColor(255, 255, 255);
                    doc.setLineWidth(spacing);
                    doc.rect(xPos, yPos, cardW, cardH); 

                    c++; if(c >= cols) { c=0; r++; }
                    if(r >= rows && i < total - 1) { doc.addPage(); c=0; r=0; }
                }

                doc.save(`${document.getElementById('t5FileName').value || 'ID_Cards'}.pdf`);
                statusTxt.innerText = "✅ تم الانتهاء بنجاح!";
                setTimeout(() => container.classList.add('hidden'), 5000);

            } catch (err) {
                console.error(err);
                statusTxt.innerText = "❌ حدث خطأ: " + err.message;
            }
        }
    </script>
</body>
</html>
