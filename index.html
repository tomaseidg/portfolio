<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thomas Eid - Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ---------- VARIABLES ---------- */
    :root {
      --bg: #0f172a;
      --card: #0b1220;
      --text: #f8fafc;
      --muted: #9aa6b2;
      --accent: #38bdf8;
      --border: rgba(255,255,255,0.06);
      --shadow: rgba(2,6,23,0.6);
      --card-hover: rgba(56, 189, 248, 0.05);
      --header-height: 50px;
      --footer-height: 40px;
    }

    .theme-light {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #0b1220;
      --muted: #475569;
      --accent: #0ea5e9;
      --border: rgba(11,20,32,0.06);
      --shadow: rgba(11,20,32,0.1);
      --card-hover: rgba(14, 165, 233, 0.05);
    }

    .theme-dark {
      --bg: #0f172a;
      --card: #0b1220;
      --text: #f8fafc;
      --muted: #9aa6b2;
      --accent: #38bdf8;
      --border: rgba(255,255,255,0.06);
      --shadow: rgba(2,6,23,0.6);
      --card-hover: rgba(56, 189, 248, 0.05);
    }

    /* Base reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background 250ms ease, color 250ms ease;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    /* Fixed Thin Topbar */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: var(--card);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      justify-content: center;
      padding: 0 20px;
    }
    .topbar-content {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* Theme toggle button */
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease;
    }
    .theme-toggle:hover { 
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    /* Main Layout */
    .main-wrapper {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: calc(var(--header-height) + 30px) 20px calc(var(--footer-height) + 30px);
    }
    
    .portfolio-layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    /* Left Side: Fixed Profile Card */
    .profile {
      text-align: center;
      background: var(--card);
      border-radius: 14px;
      padding: 30px 24px;
      width: 100%;
      max-width: 320px;
      box-shadow: 0 8px 30px var(--shadow);
      border: 1px solid var(--border);
      position: sticky;
      top: calc(var(--header-height) + 30px);
      flex-shrink: 0;
      height: calc(100vh - var(--header-height) - var(--footer-height) - 60px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      margin: 0 auto 15px;
      border: 3px solid var(--accent);
      padding: 3px;
      background: var(--bg);
    }

    .text h1 { font-size: 1.7rem; margin: 0 0 4px; color: var(--text); }
    .lab-name { font-weight: 400; font-size: 1rem; margin-bottom: 12px; color: var(--muted); }
    .role {
      font-size: 0.95rem; color: var(--accent); font-weight: 500; margin-bottom: 20px;
      display: inline-block; background: var(--card-hover); padding: 4px 14px;
      border-radius: 20px; border: 1px solid var(--border);
    }

    .contact h2 { font-size: 1.05rem; color: var(--muted); margin-bottom: 15px; font-weight: 600; }
    .social-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .social-links a {
      color: var(--muted); font-size: 1.3rem; transition: all 0.2s;
      background: var(--bg); width: 40px; height: 40px; display: flex;
      align-items: center; justify-content: center; border-radius: 50%;
      border: 1px solid var(--border); text-decoration: none;
    }
    .social-links a:hover { color: var(--accent); border-color: var(--accent); transform: translateY(-3px); }

    /* Right Side: Dynamic Content Area */
    .projects-container { flex-grow: 1; width: 100%; }
    
    /* View Header (For Sub-pages) */
    .view-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn:hover {
      background: var(--card-hover);
      color: var(--accent);
      border-color: var(--accent);
    }

    .projects-header { font-size: 1.8rem; color: var(--text); font-weight: 700; margin: 0; }

    /* Grid Layouts */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      animation: fadeIn 0.4s ease;
    }

    /* Used for YouTube Cloud boxes to fit more */
    .grid-small {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    /* Cards */
    .project-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 30px 20px;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
    }

    .project-card i { font-size: 2.5rem; color: var(--accent); margin-bottom: 5px; transition: transform 0.25s ease; }
    .project-card h3 { font-size: 1.15rem; font-weight: 600; margin: 0; line-height: 1.3;}
    .project-card p { font-size: 0.85rem; color: var(--muted); margin: 0; line-height: 1.4;}

    .project-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 10px 25px var(--shadow);
      background: var(--card-hover);
    }
    .project-card:hover i { transform: scale(1.08); }

    /* Section Subtitle for enterprise */
    .section-divider {
      grid-column: 1 / -1;
      font-size: 1.2rem;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      margin-top: 15px;
      font-weight: 600;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Footer */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--footer-height);
      display: flex; align-items: center; justify-content: center;
      background: var(--card); border-top: 1px solid var(--border);
      z-index: 1000; font-size: 0.85rem; color: var(--muted);
    }
    .footer a { color: var(--accent); text-decoration: none; font-weight: 600; margin-left: 4px; }
    .footer a:hover { text-decoration: underline; }

    /* ========== FLOW DIAGRAM ========== */
    .flowchart {
      display: flex; flex-direction: column; align-items: center;
      gap: 0; margin: 32px 0; background: var(--bg);
      padding: 30px 20px; border-radius: 12px; border: 1px dashed var(--border);
    }
    .flow-row { display: flex; justify-content: center; align-items: center; width: 100%; }
    .flow-node {
      background: var(--card); border: 2px solid var(--accent);
      padding: 11px 22px; border-radius: 8px; font-weight: 700;
      text-align: center; font-size: 0.9rem; min-width: 240px;
      position: relative; z-index: 2; color: var(--text);
    }
    .flow-node.hr { border-color: #f59e0b; } /* Warning Color */
    .flow-node.ps { border-color: #a855f7; }
    .flow-node.found { border-color: #10b981; } /* Success Color */
    .flow-node.notfound { border-color: #ef4444; } /* Danger Color */
    .flow-node small { display: block; font-size: 0.72rem; color: var(--muted); font-weight: 400; margin-top: 2px; }

    .flow-arrow-down {
      width: 2px; height: 28px; background: var(--muted);
      margin: 0 auto; position: relative;
    }
    .flow-arrow-down::after {
      content: ''; position: absolute; bottom: -6px; left: -4px;
      border-width: 6px 5px 0; border-style: solid;
      border-color: var(--muted) transparent transparent;
    }

    .flow-split-row {
      display: flex; justify-content: center; gap: 60px;
      width: 100%; position: relative; margin-top: 0;
    }
    .flow-split-row::before {
      content: ''; position: absolute;
      top: 0; left: calc(50% - 150px); width: 300px;
      height: 2px; background: var(--muted);
    }
    .flow-branch {
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }
    .flow-branch-arrow {
      width: 2px; height: 28px; position: relative; margin: 0 auto;
    }
    .flow-branch-arrow.success { background: #10b981; }
    .flow-branch-arrow.success::after {
      content: ''; position: absolute; bottom: -6px; left: -4px;
      border-width: 6px 5px 0; border-style: solid; border-color: #10b981 transparent transparent;
    }
    .flow-branch-arrow.danger { background: #ef4444; }
    .flow-branch-arrow.danger::after {
      content: ''; position: absolute; bottom: -6px; left: -4px;
      border-width: 6px 5px 0; border-style: solid; border-color: #ef4444 transparent transparent;
    }

    @media (max-width: 900px) {
      .flow-split-row { flex-direction: column; gap: 0; align-items: center; }
      .flow-split-row::before { display: none; }
      .portfolio-layout { flex-direction: column; align-items: center; }
      .profile { position: static; max-width: 100%; height: auto; margin-bottom: 20px; }
      .main-wrapper { padding-top: calc(var(--header-height) + 20px); }
      .view-header { flex-direction: column; text-align: center; gap: 15px; }
      .back-btn { align-self: flex-start; }
    }
    @media (max-width: 480px) {
      .brand { display: none; }
      .projects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    /* ================= THEME LOGIC ================= */
    const toggle = document.getElementById('theme-toggle');
    const stored = localStorage.getItem('theme'); 

    function applyTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.classList.add('theme-dark');
        document.documentElement.classList.remove('theme-light');
        document.getElementById('icon-moon').style.display = 'inline-block';
        document.getElementById('icon-sun').style.display = 'none';
      } else {
        document.documentElement.classList.add('theme-light');
        document.documentElement.classList.remove('theme-dark');
        document.getElementById('icon-moon').style.display = 'none';
        document.getElementById('icon-sun').style.display = 'inline-block';
      }
    }

    if (stored === 'light') applyTheme('light');
    else { applyTheme('dark'); if (!stored) localStorage.setItem('theme', 'dark'); }

    toggle.addEventListener('click', () => {
      const next = document.documentElement.classList.contains('theme-dark') ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });

    /* ================= DATA ARRAYS ================= */

        { title: "IAM Users, Groups & Policies", url: "https://youtu.be/RyrrDvr8Ec4?si=wv-oKl3RoNrBCkeJ", desc: "CCP & SAA Practice" },

        { title: "AMount EFS to EC2", url: "https://youtu.be/z_NP4wSmtL4?si=4CDQFBFAcphg_Qbn", desc: "CCP & SAA Practice" },

        { title: "AWS KMS Encryption ", url: "https://youtu.be/q9X7Q66rAMw?si=AiJGwkn1tVcWPmas", desc: "CCP & SAA Practice" },

        { title: "Automating Infrastructure Deployment ", url: "https://youtu.be/VbkCazI6uQg?si=gUEWmaFo_bGV0xnn", desc: "CCP & SAA Practice" },
        { title: "Amazon SQS, SNS & S3", url: "https://youtu.be/stPksrX1PSY?si=YcMivOzuYhEG2QZb", desc: "CCP & SAA Practice" },
        { title: "Serverless Inventory System", url: "https://youtu.be/baRSy5KJaYE?si=B3GYG11mLu7FJHvB", desc: "CCP & SAA Practice" },
        { title: "Serverless Daily Sales Report", url: "Serverless Daily Sales Report", desc: "CCP & SAA Practice" },
    ];

    function generateCloudVideos() {
      let html = '';
      awsLabs.forEach((lab) => {
          let targetAttr = (lab.url !== '#' && lab.url !== '') ? 'target="_blank"' : '';

          <a href="${lab.url}" ${targetAttr} class="project-card" style="padding: 20px 10px; text-decoration: none;">

            <p style="font-size: 0.75rem; color: var(--muted);">${lab.desc}</p>

      return html;

    /* ================= SPA ROUTING LOGIC ================= */

            <a href="https://wa.me/201288818834" target="_blank" title="WhatsApp" style="width: 45px; height: 45px; font-size: 1.4rem;"><i class="fab fa-whatsapp"></i></a>
          </div>

        </div>
      `,

      cloud: `
        <div class="view-header">
          <button onclick="navigate('home')" class="back-btn"><i class="fas fa-arrow-left"></i> Back</button>
          <h2 class="projects-header">Cloud Projects</h2>
        </div>
        <p style="color: var(--muted); margin-bottom: 20px;">AWS Certified Cloud Practitioner (CCP) & Solutions Architect Associate (SAA) Hands-on Labs.</p>
        <div class="projects-grid grid-small">

      `,

      devops: `

          <button onclick="navigate('home')" class="back-btn"><i class="fas fa-arrow-left"></i> Back</button>
          <h2 class="projects-header">DevOps Projects</h2>
        </div>
        <div class="projects-grid">

          .then(htmlContent => {
            container.innerHTML = htmlContent;
            window.scrollTo({ top: 0, behavior: 'smooth' });
          })
          .catch(error => {
            container.innerHTML = `<div style="text-align:center; color:var(--muted); padding:50px;"><i class="fas fa-exclamation-circle" style="font-size:2rem; color:red;"></i><p style="margin-top:10px;">Error loading project details.</p></div>`;
            console.error('Error:', error);
          });
      }
    }

    // Initialize Home View on Load
    document.addEventListener("DOMContentLoaded", () => {
      navigate('home');
    });

  </script>
</body>
</html>
